<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SliderSnake - Free Multiplayer Snake Game</title>
    <meta name="description" content="Play SliderSnake! A unique multiplayer snake game where small snakes are faster. Adopt a Bestie, raise babies, and dominate the arena. Free to play online.">
    <meta name="keywords" content="snake game, multiplayer, slither.io clone, browser game, python game, underdog mechanic">
    <meta name="robots" content="index, follow">
    <style>
        body { margin: 0; overflow: hidden; background: #161616; color: white; font-family: 'Segoe UI', Arial, sans-serif; user-select: none; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* UI w grze */
        #ui { position: absolute; top: 15px; left: 15px; background: rgba(0, 0, 0, 0.4); padding: 10px 15px; border-radius: 6px; pointer-events: none; display: none; z-index: 10; }
        #ui h2 { margin: 0 0 3px 0; font-size: 16px; color: #00ff7f; }
        #ui p { margin: 2px 0; font-size: 13px; font-weight: bold; }
        .connected { color: #00ff7f; }
        .disconnected { color: #ff4444; }

        /* --- REPLIKA LOBBY SLITHER.IO DLA SLIDERSNAKE --- */
        #slither-lobby-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #141419;
        }

        .logo-title {
            font-size: 110px; font-weight: bold; margin: 0 0 40px 0; font-style: normal; letter-spacing: -4px;
            background: linear-gradient(to right, #4fe171, #4de073, #7252db, #7252db);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.9));
        }

        .slither-input {
            width: 260px; background: #000000; border: 2px solid #555; border-radius: 25px;
            padding: 12px 20px; color: #fff; font-size: 18px; font-weight: 500;
            text-align: center; outline: none; margin-bottom: 18px;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.8); transition: border-color 0.2s;
        }
        .slither-input:focus { border-color: #fff; }

        .slither-play-btn {
            background: #2b6144; color: white; border: 2px solid #3d805b; border-radius: 20px;
            padding: 8px 30px; font-size: 20px; font-weight: bold; cursor: pointer; outline: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: background 0.2s, transform 0.1s;
        }
        .slither-play-btn:hover { background: #347552; transform: scale(1.03); }

        .bestie-subtext { color: #00ff7f; font-size: 14px; font-weight: bold; margin: 15px 0 0 0; text-shadow: 0 0 5px rgba(0,255,127,0.3); }
        #errorMsg { color: #ff4444; font-size: 12px; margin-top: 5px; font-weight: bold; height: 15px; }

        /* LEWY DOLNY RÓG - CHANGE SKIN */
        #skin-corner-btn {
            position: absolute; bottom: 20px; left: 30px; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: transform 0.2s;
        }
        #skin-corner-btn:hover { transform: scale(1.05); }
        #skin-corner-btn span { color: #52ec87; font-size: 14px; font-weight: bold; margin-top: 5px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }

        /* Popup wyboru skórek */
        #skinMenu {
            position: absolute; bottom: 100px; left: 30px; background: rgba(0,0,0,0.85); 
            border: 2px solid #444; padding: 10px; border-radius: 15px; display: none; gap: 5px; box-shadow: 0 0 15px black;
        }
        .slither-skin-btn {
            padding: 6px 12px; background: #222; color: white; border: 1px solid #555; border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="ui">
    <h2>SliderSnake Web</h2>
    <p>Score: <span id="score">0</span></p>
    <p>Status: <span id="status" class="disconnected">Connecting...</span></p>
</div>

<!-- MENU GŁÓWNE -->
<div id="slither-lobby-wrapper">
    <h1 class="logo-title">SliderSnake</h1>

    <input type="text" id="usernameInput" placeholder="Nickname" maxlength="15" class="slither-input">
    
    <button onclick="startGame()" class="slither-play-btn">Play</button>
    
    <p class="bestie-subtext">Click PLAY to start with your Bestie!</p>
    <p id="errorMsg"></p>

    <!-- MENU WYBORU SKÓREK -->
    <div id="skinMenu">
        <button onclick="selectSkin('classic')" class="slither-skin-btn">Classic</button>
        <button onclick="selectSkin('neon')" class="slither-skin-btn">Neon</button>
        <button onclick="selectSkin('rainbow')" class="slither-skin-btn">Rainbow</button>
        <button onclick="selectSkin('gold')" class="slither-skin-btn">Gold</button>
        <button onclick="selectSkin('void')" class="slither-skin-btn">Void</button>
    </div>

    <!-- LEWY DOLNY RÓG -->
    <div id="skin-corner-btn" onclick="toggleSkinMenu()">
        <canvas id="previewCanvas" width="70" height="50" style="position:static; background:transparent; display:block;"></canvas>
        <span>Change Skin</span>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const c = document.getElementById("gameCanvas"), x = c.getContext("2d");
    c.width = innerWidth; c.height = innerHeight;
    let snakes = {}, foods = [], camX = 0, camY = 0, myId = null;
    let selectedSkin = "classic";
    let playerName = "";
    let inGame = false;

    // --- MINI PODGLĄD W LEWYM DOLNYM ROGU ---
    const previewCanvas = document.getElementById("previewCanvas");
    const pCtx = previewCanvas.getContext("2d");
    let previewHue = 0;

    function drawPreview() {
        pCtx.clearRect(0, 0, 70, 50);
        let cx = 35, cy = 25, radius = 9;
        
        let r = 0, g = 255, b = 0; // Domyślne wartości dla classic
        
        if (selectedSkin === "gold") { r = 255; g = 215; b = 0; }
        if (selectedSkin === "void") { r = 0; g = 0; b = 0; }
        if (selectedSkin === "neon") { r = 0; g = 255; b = 127; }
        
        if (selectedSkin === "rainbow") {
            let hue = previewHue; 
            let hueStep = hue / 60; 
            let xVal = Math.floor((1 - Math.abs((hueStep % 2) - 1)) * 255);
            if (hueStep < 1) { r = 255; g = xVal; b = 0; }
            else if (hueStep < 2) { r = xVal; g = 255; b = 0; }
            else if (hueStep < 3) { r = 0; g = 255; b = xVal; }
            else if (hueStep < 4) { r = 0; g = xVal; b = 255; }
            else if (hueStep < 5) { r = xVal; g = 0; b = 255; }
            else { r = 255; g = 0; b = xVal; }
        }

        pCtx.fillStyle = "rgb(" + r + "," + g + "," + b + ")";
        pCtx.beginPath(); pCtx.arc(cx, cy, radius, 0, Math.PI * 2); pCtx.fill();
        
        if (selectedSkin === "void") { 
            pCtx.strokeStyle = "white"; 
            pCtx.lineWidth = 1; 
            pCtx.stroke(); 
        }

        // Oczy podglądu
        pCtx.fillStyle = "white"; pCtx.beginPath(); pCtx.arc(cx - 3, cy - 3, 2.5, 0, Math.PI*2); pCtx.fill();
        pCtx.beginPath(); pCtx.arc(cx + 3, cy - 3, 2.5, 0, Math.PI*2); pCtx.fill();
        pCtx.fillStyle = "black"; pCtx.beginPath(); pCtx.arc(cx - 3, cy - 3, 1, 0, Math.PI*2); pCtx.fill();
        pCtx.beginPath(); pCtx.arc(cx + 3, cy - 3, 1, 0, Math.PI*2); pCtx.fill();
        
        previewHue = (previewHue + 3) % 360;
        requestAnimationFrame(drawPreview);
    }
    drawPreview();

    function toggleSkinMenu() {
        const menu = document.getElementById("skinMenu");
        menu.style.display = menu.style.display === "flex" ? "none" : "flex";
    }

    function selectSkin(skin) {
        selectedSkin = skin;
        document.querySelectorAll(".slither-skin-btn").forEach(btn => {
            if (btn.getAttribute("onclick").includes(skin)) btn.style.borderColor = "#00ff7f";
            else btn.style.borderColor = "#555";
        });
    }

    // --- AUTOMATYCZNE POŁĄCZENIE WEBSOCKET Z FASTAPI ---
    let ws = null;
    let targetX = 0, targetY = 0;

    function startGame() {
        const nameInput = document.getElementById("usernameInput");
        const errorMsg = document.getElementById("errorMsg");
        let name = nameInput.value.trim();
        if (!name) name = "Snake_" + Math.floor(Math.random() * 900 + 100);
        playerName = name;

        errorMsg.innerText = "Connecting...";

        const protocol = window.location.protocol === "https:" ? "wss://" : "ws://";
        const wsUrl = protocol + window.location.host + "/ws";

        ws = new WebSocket(wsUrl);

        ws.onopen = () => {
            document.getElementById("status").innerText = "Connected";
            document.getElementById("status").className = "connected";
            document.getElementById("ui").style.display = "block";
            document.getElementById("slither-lobby-wrapper").style.display = "none";
            inGame = true;

            ws.send(JSON.stringify({
                type: "join", name: playerName, skin: selectedSkin
            }));
        };

        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            if (msg.type === "joined") {
                myId = msg.player_id;
                initGameControls();
                requestAnimationFrame(drawGame);
            } 
            else if (msg.type === "update") {
                snakes = {};
                msg.snakes.forEach(s => { snakes[s.id] = s; });
                foods = msg.foods;

                if (myId && snakes[myId]) {
                    document.getElementById("score").innerText = snakes[myId].points;
                    camX = snakes[myId].x; camY = snakes[myId].y;
                }
            }
        };

        ws.onclose = () => {
            document.getElementById("status").innerText = "Disconnected";
            document.getElementById("status").className = "disconnected";
            document.getElementById("slither-lobby-wrapper").style.display = "flex";
            document.getElementById("ui").style.display = "none";
            inGame = false;
            errorMsg.innerText = "Connection lost!";
        };
    }

    function initGameControls() {
        window.onmousemove = (e) => {
            // POPRAWIONE: Obie pozycje myszy obliczane są teraz prawidłowo względem wymiarów okna
            targetX = camX + (e.clientX - innerWidth / 2);
            targetY = camY + (e.clientY - innerHeight / 2);
            if (ws && ws.readyState === WebSocket.OPEN && myId) {
                ws.send(JSON.stringify({
                    type: "move", player_id: myId, targetX: targetX, targetY: targetY
                }));
            }
        };
    }

    // --- ARENA DO GRY ---
    function drawGame() {
        if (!inGame || !myId) return;
        x.fillStyle = "#161616";
        x.fillRect(0, 0, c.width, c.height);

        x.save();
        x.translate(c.width / 2 - camX, c.height / 2 - camY);

        // Linie siatki
        x.strokeStyle = "#242424";
        x.lineWidth = 1;
        for (let i = 0; i <= 5000; i += 100) {
            x.beginPath(); x.moveTo(i, 0); x.lineTo(i, 5000); x.stroke();
            x.beginPath(); x.moveTo(0, i); x.lineTo(5000, i); x.stroke();
        }

        // Granica mapy
        x.strokeStyle = "#ff4444"; x.lineWidth = 4; x.strokeRect(0, 0, 5000, 5000);

        // Jedzenie
        foods.forEach(f => {
            x.fillStyle = "#ffdd44"; x.shadowBlur = 6; x.shadowColor = "#ffdd44";
            x.beginPath(); x.arc(f.x, f.y, 5, 0, Math.PI * 2); x.fill();
        });
        x.shadowBlur = 0;

        // Węże (POPRAWIONE: rysowanie z użyciem współrzędnych X i Y z tablicy segmentu)
        Object.values(snakes).forEach(s => {
            x.fillStyle = s.color;
            s.segments.slice().reverse().forEach((seg, idx) => {
                x.beginPath();
                let realIdx = s.segments.length - 1 - idx;
                x.arc(seg[0], seg[1], realIdx === 0 ? 12 : 10, 0, Math.PI * 2);
                x.fill();
            });
            x.fillStyle = "rgba(255,255,255,0.7)"; x.font = "bold 13px Arial"; x.textAlign = "center";
            x.fillText(s.name, s.x, s.y - 20);
        });

        x.restore();
        requestAnimationFrame(drawGame);
    }

    window.onresize = () => { c.width = innerWidth; c.height = innerHeight; };
</script>
</body>
</html>
