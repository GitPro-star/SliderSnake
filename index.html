<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SliderSnake - Free Multiplayer Snake Game</title>
    <meta name="description" content="Play SliderSnake! A unique multiplayer snake game where small snakes are faster. Adopt a Bestie, raise babies, and dominate the arena. Free to play online.">
    <meta name="keywords" content="snake game, multiplayer, slither.io clone, browser game, python game, underdog mechanic">
    <meta name="robots" content="index, follow">
    <style>
        body { margin: 0; overflow: hidden; background: #0c0c14; color: white; font-family: 'Segoe UI', Arial, sans-serif; user-select: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 15px; left: 15px; background: rgba(0, 0, 0, 0.6); padding: 12px 20px; border-radius: 10px; pointer-events: none; display: none; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(4px); }
        h2 { margin: 0 0 5px 0; font-size: 18px; color: #00ff7f; text-shadow: 0 0 5px rgba(0,255,127,0.3); }
        p { margin: 2px 0; font-size: 14px; font-weight: bold; }
        .connected { color: #00ff7f; font-weight: bold; }
        .disconnected { color: #ff4444; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui">
    <h2>SliderSnake Web</h2>
    <p>Score: <span id="score">0</span></p>
    <p>Status: <span id="status" class="disconnected">Connecting...</span></p>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const c = document.getElementById("gameCanvas"), x = c.getContext("2d");
    c.width = innerWidth; c.height = innerHeight;
    let snakes = {}, foods = [], camX = 0, camY = 0, myId = null;
    let selectedSkin = "classic";
    let playerName = "";

    // --- LOGIN MENU W STYLU SLITHER.IO ---
    const loginMenu = document.createElement("div");
    loginMenu.id = "loginMenu";
    loginMenu.style.cssText = "position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(20,20,35,0.85);padding:30px;border-radius:30px;text-align:center;color:white;z-index:100;box-shadow:0 0 40px rgba(0,255,127,0.2);width:340px;display:flex;flex-direction:column;align-items:center;border:1px solid rgba(255,255,255,0.05);backdrop-filter:blur(8px);font-family:'Arial',sans-serif;";
    
    loginMenu.innerHTML = `
        <h1 style="margin:0 0 5px 0; color:#00ff7f; font-size:36px; font-weight:900; letter-spacing:2px; text-shadow:0 0 15px rgba(0,255,127,0.6); font-style:italic;">slither.io</h1>
        <p style="margin:0 0 20px 0; font-size:12px; color:#888; letter-spacing:1px;">SLIDERSNAKE EDITION</p>

        <div id="previewBox" style="width:160px;height:120px;background:#06060c;border:2px solid #222;border-radius:50%;margin-bottom:20px;position:relative;overflow:hidden;box-shadow:inset 0 0 20px rgba(0,0,0,0.9);">
            <canvas id="previewCanvas" width="160" height="120" style="display:block;"></canvas>
        </div>

        <input type="text" id="usernameInput" placeholder="Nick" maxlength="15" 
               style="width:85%;padding:12px 15px;margin-bottom:15px;border-radius:25px;border:2px solid #333;background:rgba(0,0,0,0.4);color:white;text-align:center;font-size:18px;font-weight:bold;outline:none;transition:0.3s;box-shadow:inset 0 2px 5px rgba(0,0,0,0.5);">
        
        <p style="margin:0 0 10px 0;font-size:13px;color:#aaa;font-weight:bold;">Skins</p>
        <div style="display:flex;gap:5px;justify-content:center;margin-bottom:25px;width:95%;flex-wrap:wrap;">
            <button onclick="selectSkin('classic')" class="skin-btn" style="padding:6px 12px;background:#2a2a40;color:white;border:2px solid #444;border-radius:15px;cursor:pointer;font-size:12px;font-weight:bold;transition:0.2s;outline:none;">Classic</button>
            <button onclick="selectSkin('neon')" class="skin-btn" style="padding:6px 12px;background:#2a2a40;color:#00ff7f;border:2px solid #444;border-radius:15px;cursor:pointer;font-size:12px;font-weight:bold;transition:0.2s;outline:none;">Neon</button>
            <button onclick="selectSkin('rainbow')" class="skin-btn" style="padding:6px 12px;background:#2a2a40;color:#ff00ff;border:2px solid #444;border-radius:15px;cursor:pointer;font-size:12px;font-weight:bold;transition:0.2s;outline:none;">Rainbow</button>
            <button onclick="selectSkin('gold')" class="skin-btn" style="padding:6px 12px;background:#ffd700;color:black;border:2px solid transparent;border-radius:15px;cursor:pointer;font-size:12px;font-weight:bold;transition:0.2s;outline:none;">Gold</button>
            <button onclick="selectSkin('void')" class="skin-btn" style="padding:6px 12px;background:#05050a;color:white;border:2px solid #555;border-radius:15px;cursor:pointer;font-size:12px;font-weight:bold;transition:0.2s;outline:none;">Void</button>
        </div>

        <button onclick="startGame()" style="width:90%;padding:14px;background:#00ff7f;color:black;border:none;border-radius:30px;font-weight:bold;font-size:22px;cursor:pointer;box-shadow:0 4px 15px rgba(0,255,127,0.4);transition:0.2s;letter-spacing:1px;text-transform:uppercase;outline:none;">Play</button>
        
        <p id="subText" style="color:#00ff7f;font-size:13px;margin:12px 0 0 0;font-weight:bold;opacity:0.8;text-shadow:0 0 5px rgba(0,255,127,0.3);">Click PLAY to start with your Bestie!</p>
        <p id="errorMsg" style="color:#ff4444;font-size:12px;height:15px;margin:8px 0 0 0;font-weight:bold;"></p>
    `;
    document.body.appendChild(loginMenu);

    // CSS dla animacji i najechania myszką
    const styleSheet = document.createElement("style");
    styleSheet.innerText = `
        #usernameInput:focus { border-color: #00ff7f !important; box-shadow: 0 0 10px rgba(0,255,127,0.5), inset 0 2px 5px rgba(0,0,0,0.5) !important; }
        .skin-btn:hover { transform: scale(1.05); background: #3a3a55 !important; }
        button[onclick="startGame()"]:hover { transform: scale(1.03); background: #22ff99 !important; box-shadow: 0 6px 20px rgba(0,255,127,0.6) !important; }
    `;
    document.head.appendChild(styleSheet);

    // --- PREVIEW LOGIC ---
    const previewCanvas = document.getElementById("previewCanvas");
    const pCtx = previewCanvas.getContext("2d");
    let previewHue = 0;

    function drawPreview() {
        pCtx.fillStyle = "#06060c";
        pCtx.fillRect(0, 0, 160, 120);
        let cx = 80, cy = 60, radius = 12;
        let rgb = [0, 255, 0];
        if (selectedSkin === "gold") rgb = [255, 215, 0];
        if (selectedSkin === "void") rgb = [0, 0, 0];
        
        pCtx.shadowBlur = 15;
        if (selectedSkin === "rainbow") {
            let hue = previewHue; 
            let hueStep = hue / 60; 
            let xVal = (1 - Math.abs((hueStep % 2) - 1)) * 255;
            if (hueStep < 1) rgb = [255, xVal, 0]; 
            else if (hueStep < 2) rgb = [xVal, 255, 0]; 
            else if (hueStep < 3) rgb = [0, 255, xVal];
            else if (hueStep < 4) rgb = [0, xVal, 255]; 
            else if (hueStep < 5) rgb = [xVal, 0, 255]; 
            else rgb = [255, 0, xVal];
            pCtx.shadowColor = `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
        } else if (selectedSkin === "gold") { pCtx.shadowColor = "#ffd700"; pCtx.shadowBlur = 25; }
        else if (selectedSkin === "void") { pCtx.shadowColor = "white"; pCtx.shadowBlur = 10; }
        else if (selectedSkin === "neon") { pCtx.shadowColor = `rgb(${Math.min(255,rgb[0]+50)},${Math.min(255,rgb[1]+50)},${Math.min(255,rgb[2]+50)})`; pCtx.shadowBlur = 30; }
        else { pCtx.shadowColor = `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`; }

        pCtx.fillStyle = `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
        pCtx.beginPath(); pCtx.arc(cx, cy, radius, 0, Math.PI * 2); pCtx.fill();
        if (selectedSkin === "void") { pCtx.strokeStyle = "white"; pCtx.lineWidth = 2; pCtx.stroke(); }
        
        // Eyes
        pCtx.fillStyle = "white"; pCtx.beginPath(); pCtx.arc(cx - 4, cy - 4, 3, 0, Math.PI*2); pCtx.fill();
        pCtx.beginPath(); pCtx.arc(cx + 4, cy - 4, 3, 0, Math.PI*2); pCtx.fill();
        pCtx.fillStyle = "black"; pCtx.beginPath(); pCtx.arc(cx - 4, cy - 4, 1.5, 0, Math.PI*2); pCtx.fill();
        pCtx.beginPath(); pCtx.arc(cx + 4, cy - 4, 1.5, 0, Math.PI*2); pCtx.fill();

        // Bestie
        let bx = cx + 25, by = cy + 12;
        pCtx.fillStyle = `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`; pCtx.shadowColor = `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
        pCtx.beginPath(); pCtx.arc(bx, by, radius * 0.7, 0, Math.PI * 2); pCtx.fill();
        pCtx.fillStyle = "white"; pCtx.beginPath(); pCtx.arc(bx - 2, by - 2, 1.8, 0, Math.PI*2); pCtx.fill();
        pCtx.beginPath(); pCtx.arc(bx + 2, by - 2, 1.8, 0, Math.PI*2); pCtx.fill();
        pCtx.fillStyle = "black"; pCtx.beginPath(); pCtx.arc(bx - 2, by - 2, 0.8, 0, Math.PI*2); pCtx.fill();
        pCtx.beginPath(); pCtx.arc(bx + 2, by - 2, 0.8, 0, Math.PI*2); pCtx.fill();
        
        previewHue = (previewHue + 2) % 360;
        requestAnimationFrame(drawPreview);
    }
    drawPreview();

    function selectSkin(skin) {
        selectedSkin = skin;
        document.querySelectorAll(".skin-btn").forEach(btn => {
            if (btn.getAttribute("onclick").includes(skin)) { 
                btn.style.borderColor = "#00ff7f"; 
                btn.style.boxShadow = "0 0 8px rgba(0,255,127,0.5)";
            } else { 
                btn.style.borderColor = btn.innerText.toLowerCase() === "void" ? "#555" : "transparent"; 
                btn.style.boxShadow = "none";
            }
        });
    }
    selectSkin('classic'); // Wybierz startowo classic

    // --- NATYWNA OBSŁUGA WEBSOCKET DLA FASTAPI ---
    let ws = null;
    let targetX = 0, targetY = 0;

    function startGame() {
        const nameInput = document.getElementById("usernameInput");
        const errorMsg = document.getElementById("errorMsg");
        let name = nameInput.value.trim();
        if (!name) name = "Player_" + Math.floor(Math.random() * 999);
        playerName = name;

        errorMsg.innerText = "Connecting to arena...";

        // Określenie protokołu (ws:// lub wss://) na podstawie środowiska hostingu Render
        const protocol = window.location.protocol === "https:" ? "wss://" : "ws://";
        const wsUrl = protocol + window.location.host + "/ws";

        ws = new WebSocket(wsUrl);

        ws.onopen = () => {
            document.getElementById("status").innerText = "Connected";
            document.getElementById("status").className = "connected";
            document.getElementById("ui").style.display = "block";
            loginMenu.style.display = "none";

            // Wysłanie pakietu powitalnego zgodnego ze strukturą w Pythonie
            ws.send(JSON.stringify({
                type: "join",
                name: playerName,
                skin: selectedSkin
            }));
        };

        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            
            if (msg.type === "joined") {
                myId = msg.player_id;
                initGameControls();
                requestAnimationFrame(drawGame);
            } 
            else if (msg.type === "update") {
                // Konwersja listy węży z Pythona na obiekt JS dla wygody rysowania
                snakes = {};
                msg.snakes.forEach(s => { snakes[s.id] = s; });
                foods = msg.foods;

                if (myId && snakes[myId]) {
                    document.getElementById("score").innerText = snakes[myId].points;
                    camX = snakes[myId].x;
                    camY = snakes[myId].y;
                }
            }
        };

        ws.onclose = () => {
            document.getElementById("status").innerText = "Disconnected";
            document.getElementById("status").className = "disconnected";
            loginMenu.style.display = "flex";
            errorMsg.innerText = "Connection lost! Try again.";
        };
    }

    function initGameControls() {
        window.onmousemove = (e) => {
            // Przeliczanie ruchu myszki relatywnie do środka ekranu (pozycji gracza)
            targetX = camX + (e.clientX - innerWidth / 2);
            targetY = camY + (e.clientY - innerHeight / 2);
            
            if (ws && ws.readyState === WebSocket.OPEN && myId) {
                ws.send(JSON.stringify({
                    type: "move",
                    player_id: myId,
                    targetX: targetX,
                    targetY: targetY
                }));
            }
        };
    }

    // --- RENDROWANIE GRAFIKI NA CANVAS ---
    function drawGame() {
        if (!myId) return;
        
        // Czyszczenie i rysowanie tła areny
        x.fillStyle = "#0c0c14";
        x.fillRect(0, 0, c.width, c.height);

        x.save();
        // Centrowanie kamery świata na graczu
        x.translate(c.width / 2 - camX, c.height / 2 - camY);

        // Rysowanie jedzenia (czerwone kropki z lekką poświatą)
        foods.forEach(f => {
            x.fillStyle = "#ff4444";
            x.shadowBlur = 10;
            x.shadowColor = "#ff4444";
            x.beginPath();
            x.arc(f.x, f.y, 5, 0, Math.PI * 2);
            x.fill();
        });
        x.shadowBlur = 0; // Reset poświaty dla węży

        // Rysowanie wszystkich węży
        Object.values(snakes).forEach(s => {
            x.fillStyle = s.color;
            
            // Rysowanie segmentów od końca do głowy
            s.segments.forEach((seg, index) => {
                x.beginPath();
                // Głowa (indeks 0) jest delikatnie większa
                let r = index === 0 ? 12 : 10; 
                x.arc(seg[0], seg[1], r, 0, Math.PI * 2);
                x.fill();
            });
            
            // Podpis nicku nad głową węża
            x.fillStyle = "rgba(255,255,255,0.8)";
            x.font = "bold 14px Arial";
            x.textAlign = "center";
            x.fillText(s.name, s.x, s.y - 22);
        });

        x.restore();
        requestAnimationFrame(drawGame);
    }

    window.onresize = () => { c.width = innerWidth; c.height = innerHeight; };
</script>
</body>
</html>
